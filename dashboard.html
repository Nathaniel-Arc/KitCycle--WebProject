<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentRack - WMSU KitCycle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <img src="images/logo.png" alt="WMSU Logo" class="logo">
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
        <input type="text" placeholder="Search items..." class="search-bar">
    </header>

    <!-- Featured Items Carousel -->
    <section class="featured">
        <h2>Featured Items</h2>
        <div class="carousel">
            <div class="carousel-item">
                <img src="images/item1.jpg" alt="Projector">
                <h3>Projector X100</h3>
                <p>₱150/day</p>
                <button class="rent-btn">Rent Now</button>
            </div>
            <div class="carousel-item">
                <img src="images/item2.jpg" alt="Camera">
                <h3>Canon DSLR</h3>
                <p>₱200/day</p>
                <button class="rent-btn">Rent Now</button>
            </div>
        </div>
    </section>

    <!-- Categories -->
    <section class="categories">
        <h2>Categories</h2>
        <div class="category-grid">
            <div class="category-card">Academic Tools</div>
            <div class="category-card">Media Equipment</div>
            <div class="category-card">Projectors</div>
            <div class="category-card">Event Gear</div>
            <div class="category-card">Club Equipment</div>
        </div>
    </section>

    <script src="js/carousel.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
