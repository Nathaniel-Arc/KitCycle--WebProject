<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Items | WMSU KitCycle</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/student-interface/student-dashboard.css">
    <link rel="stylesheet" href="../../css/student-interface/student-saved.css">
    <script src="../../script/items-data.js"></script>
    <script src="../../script/ui-utils.js"></script>
    <script src="../../script/auth.js" defer></script>

    <!-- Instant Sidebar State Check -->
    <script>
        (function() {
            const isMinimized = localStorage.getItem('sidebarMinimized') === 'true';
            if (isMinimized) {
                document.documentElement.classList.add('sidebar-is-minimized');
            }
        })();
    </script>
    <style>
        .sidebar-is-minimized .sidebar { width: 80px !important; padding: 2rem 0.5rem !important; transition: none !important; }
        .sidebar-is-minimized .dashboard-content { margin-left: 80px !important; transition: none !important; }
        .sidebar-is-minimized .profile-info, .sidebar-is-minimized .sidebar-nav span, .sidebar-is-minimized .sidebar-logout span { display: none !important; }
        .sidebar-is-minimized .sidebar-nav a { justify-content: center !important; padding: 12px 0 !important; }
        .sidebar-is-minimized .sidebar-nav i { font-size: 1.2rem !important; margin: 0 !important; }
        .sidebar-is-minimized .sidebar-profile { justify-content: center !important; padding-bottom: 1.5rem !important; }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="nav-left-group">
            <div class="sidebar-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </div>
            <div class="logo">
                <img src="../../images/wmsulogo.png" alt="WMSU Logo" class="nav-logo-img">
                <div class="logo-text">WMSU<span>KitCycle</span></div>
            </div>
        </div>
        <div class="nav-right" style="display: flex; align-items: center; gap: 30px;">
            <ul class="nav-links" style="display: flex; list-style: none; gap: 25px; align-items: center; margin: 0;">
                <li><a href="student-dashboard.html">Home</a></li>
                <li><a href="../marketplace.html">Marketplace</a></li>
                <li><a href="../howitworks.html">How It Works</a></li>
                <li><a href="../safety.html">Safety</a></li>
            </ul>
            <div class="auth-buttons">
                <!-- Injected by auth.js -->
            </div>
        </div>
    </header>

    <div class="dashboard-layout">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-profile">
                <div class="profile-avatar"><img id="sidebarProfileImg" src="../../images/nash_profile.png" alt="Profile"></div>
                <div class="profile-info">
                    <h4 id="sidebarUserName">Nash Arciaga</h4>
                    <span id="sidebarUserRole">Student</span>
                </div>
            </div>

            <ul class="sidebar-nav">
                <li><a href="student-dashboard.html"><i class="fas fa-th-large"></i> <span>Dashboard</span></a></li>
                <li><a href="student-rentals.html"><i class="fas fa-box-open"></i> <span>My Rentals</span></a></li>
                <li><a href="student-messages.html"><i class="fas fa-comments"></i> <span>Messages</span> <span class="nav-badge-v2" style="display: inline-block;">1</span></a></li>
                <li class="active"><a href="student-saved.html"><i class="fas fa-heart"></i> <span>Saved Items</span></a></li>
                <li><a href="student-rating.html"><i class="fas fa-star"></i> <span>My Rating</span></a></li>
                <li><a href="student-listings.html"><i class="fas fa-list"></i> <span>My Listings</span></a></li>
            </ul>

            <a href="javascript:void(0)" onclick="AuthSystem.confirmLogout(); return false;" class="sidebar-logout"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
        </aside>

        <main class="dashboard-content" id="mainContent">

            <div class="dashboard-banner">
                <div>
                    <h2><i class="fas fa-heart"></i> Saved Items</h2>
                    <p>Gear you're interested in for future academic needs</p>
                </div>
            </div>

            <div class="wishlist-grid" id="savedItemsGrid">
                <!-- Items will be loaded here dynamically -->
            </div>

        </main>
    </div>

    <script src="../../script/student-data.js"></script>
    <style>
        .availability-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            z-index: 10;
        }
        .availability-badge.available { background: #10b981; }
        .availability-badge.due { background: #f59e0b; }
        
        .comparison-tag {
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
            border: 1px solid #bfdbfe;
        }
    </style>
    <script>
        function renderSavedItems() {
            const grid = document.getElementById('savedItemsGrid');
            const savedNames = JSON.parse(localStorage.getItem('savedItems') || '[]');
            
            if (savedNames.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #64748b;">
                        <i class="fas fa-heart-broken" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.3;"></i>
                        <h3>No saved items yet</h3>
                        <p>Browse the marketplace to find gear for your studies!</p>
                        <a href="../marketplace.html" class="btn-primary-maroon" style="display: inline-block; margin-top: 1rem; text-decoration: none; padding: 12px 25px; border-radius: 8px; background: #800000; color: white;">Browse Marketplace</a>
                    </div>
                `;
                return;
            }

            grid.innerHTML = savedNames.map(name => {
                const item = KitCycleData.items.find(i => i.name === name);
                if (!item) return '';
                
                return `
                    <div class="wish-card">
                        <div class="wish-image">
                            <div class="availability-badge available">
                                <i class="fas fa-check-circle"></i> Available Now
                            </div>
                            <img src="${item.image}" alt="${item.name}">
                            <button class="heart-icon active" onclick="removeSavedItem('${item.name}')"><i class="fas fa-heart"></i></button>
                        </div>
                        <div class="wish-info">
                            <span class="comparison-tag"><i class="fas fa-tag"></i> Best Value</span>
                            <h4>${item.name}</h4>
                            <p class="owner-by">Listed by ${item.lender}</p>
                            <div class="wish-rating">
                                <i class="fas fa-star" style="color: #ffd700;"></i> ${item.rating} <span class="review-count">(${item.rentals})</span>
                            </div>
                            <div class="wish-price">₱${item.price} <small>/day</small></div>
                            <div class="wish-actions" style="display: flex; gap: 10px; margin-top: 15px;">
                                <button class="btn-primary-maroon" style="flex: 1; padding: 10px; background: #800000; color: white; border: none; border-radius: 6px; cursor: pointer;" onclick="window.location.href='../item-details html/item-details.html?id=${item.id}'">Check Availability</button>
                                <button class="btn-trash" style="padding: 10px; background: #f1f5f9; border: none; border-radius: 6px; cursor: pointer; color: #ef4444;" onclick="removeSavedItem('${item.name}')" title="Remove from Saved List"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function removeSavedItem(name) {
            let savedItems = JSON.parse(localStorage.getItem('savedItems') || '[]');
            savedItems = savedItems.filter(item => item !== name);
            localStorage.setItem('savedItems', JSON.stringify(savedItems));
            
            UIUtils.showToast("Item removed from Saved List", "info");
            window.dispatchEvent(new CustomEvent('savedItemsChanged'));
            renderSavedItems();
        }

        function toggleSidebar() {
            document.documentElement.classList.remove('sidebar-is-minimized');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const isMinimized = sidebar.classList.toggle('minimized');
            mainContent.classList.toggle('expanded');
            localStorage.setItem('sidebarMinimized', isMinimized);
        }

        function toggleNotifs() {
            // Handled by auth.js
        }

        window.onclick = function(event) {
            if (!event.target.closest('.nav-notification-btn')) {
                // Handled by auth.js
            }
        }

        window.onload = function() {
            const isMinimized = localStorage.getItem('sidebarMinimized') === 'true';
            if (isMinimized) {
                const sidebar = document.getElementById('sidebar');
                const mainContent = document.getElementById('mainContent');
                if (sidebar) sidebar.classList.add('minimized');
                if (mainContent) mainContent.classList.add('expanded');
            }
            renderSavedItems();
        };
    </script>

</body>

</html>
